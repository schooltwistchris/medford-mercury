name: Publish Medford Mercury

on:
  schedule:
    # Morning Edition — Mon through Sat, 10:00 UTC = 6:00 AM ET (EDT)
    - cron: '58 8 * * 1-6'
    # Sunday Edition — Sunday, 09:00 UTC = 5:00 AM ET (EDT)
    - cron: '58 8 * * 0'
  workflow_dispatch:
    inputs:
      edition_type:
        description: 'Edition type to generate'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - morning
          - sunday

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Determine edition type
        id: edition
        run: |
          if [ "${{ github.event.inputs.edition_type }}" = "sunday" ]; then
            echo "type=sunday" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.edition_type }}" = "morning" ]; then
            echo "type=morning" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%w)
            if [ "$DOW" = "0" ]; then
              echo "type=sunday" >> $GITHUB_OUTPUT
            else
              echo "type=morning" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate Morning Edition
        if: steps.edition.outputs.type == 'morning'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.js

      - name: Generate Sunday Edition
        if: steps.edition.outputs.type == 'sunday'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-sunday.js

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/deploy.js

      - name: Commit new edition to repo
        run: |
          git config user.name  "Medford Mercury Bot"
          git config user.email "bot@medfordmercury.pages.dev"
          git add magazines/
          git diff --staged --quiet || git commit -m "Edition $(date -u +%Y-%m-%d) [${{ steps.edition.outputs.type }}]"
          git push
