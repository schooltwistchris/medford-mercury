<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medford Mercury — April 21, 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0e0d0b;
    --cream: #f5f0e8;
    --rust: #c84b2f;
    --midnight: #0a0f1e;
    --gold: #d4a843;
    --sage: #3d5a47;
    --rose: #e8d5d0;
    --terminal-green: #00ff88;
    --slate: #2c3e50;
    --parchment: #ede8d6;
    --alert-red: #d62b2b;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--ink);
    overflow-x: hidden;
  }

  /* ─── MASTHEAD ─── */
  .masthead {
    background: var(--cream);
    border-bottom: 3px solid var(--ink);
    padding: 32px 60px 24px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: end;
    gap: 20px;
  }

  .masthead-left {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #555;
    line-height: 1.8;
  }

  .masthead-title {
    text-align: center;
  }

  .masthead-title .name {
    font-family: 'Fraunces', serif;
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 0.9;
    color: var(--ink);
  }

  .masthead-title .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
    margin-top: 8px;
  }

  .masthead-right {
    text-align: right;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    line-height: 1.8;
  }

  .masthead-rule {
    height: 1px;
    background: var(--ink);
    margin: 0 60px;
  }

  .masthead-sub {
    padding: 6px 60px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #666;
    border-bottom: 1px solid #ccc;
  }

  /* ─── STORY SPREADS ─── */

  /* 1 · HERO — cream / full bleed */
  .spread-hero {
    background: var(--cream);
    padding: 80px 60px 80px;
    border-bottom: 3px solid var(--ink);
    position: relative;
    overflow: hidden;
  }
  .spread-hero::before {
    content: '01';
    position: absolute;
    right: 40px;
    top: 40px;
    font-family: 'Fraunces', serif;
    font-size: 240px;
    font-weight: 900;
    color: rgba(14,13,11,0.05);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }
  .spread-hero .kicker {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 20px;
  }
  .spread-hero .headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(48px, 7vw, 88px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.02em;
    max-width: 820px;
    margin-bottom: 32px;
  }
  .spread-hero .dek {
    font-size: 20px;
    font-weight: 400;
    line-height: 1.55;
    max-width: 680px;
    color: #333;
    margin-bottom: 28px;
  }
  .spread-hero .byline {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #888;
  }
  .spread-hero .why {
    margin-top: 40px;
    padding: 24px 32px;
    background: var(--ink);
    color: var(--cream);
    display: inline-block;
    max-width: 560px;
  }
  .spread-hero .why .why-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .spread-hero .why p {
    font-size: 16px;
    line-height: 1.6;
    font-weight: 300;
  }

  /* 2 · MIDNIGHT — dark */
  .spread-midnight {
    background: var(--midnight);
    color: #e8e4da;
    padding: 80px 60px;
    border-bottom: 3px solid #1a2235;
    position: relative;
    display: grid;
    grid-template-columns: 1fr 2px 1fr;
    gap: 60px;
    align-items: start;
  }
  .spread-midnight .divider {
    background: rgba(255,255,255,0.12);
    align-self: stretch;
  }
  .spread-midnight .big-numeral {
    font-family: 'Fraunces', serif;
    font-size: 180px;
    font-weight: 900;
    color: rgba(212,168,67,0.15);
    line-height: 0.85;
    margin-bottom: -20px;
  }
  .spread-midnight .kicker {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }
  .spread-midnight .headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(36px, 4.5vw, 58px);
    font-weight: 800;
    line-height: 1.05;
    color: #f0ece0;
    margin-bottom: 28px;
  }
  .spread-midnight .dek {
    font-size: 18px;
    font-weight: 300;
    line-height: 1.65;
    color: rgba(232,228,218,0.75);
    margin-bottom: 24px;
  }
  .spread-midnight .detail-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .spread-midnight .detail-item {
    padding: 18px 22px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .spread-midnight .detail-item .dt {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .spread-midnight .detail-item .dd {
    font-size: 16px;
    font-weight: 400;
    line-height: 1.5;
    color: #e0dbd0;
  }

  /* 3 · ALERT — rose/red stamp treatment */
  .spread-alert {
    background: var(--rose);
    padding: 80px 60px;
    border-bottom: 3px solid var(--ink);
    position: relative;
    overflow: hidden;
  }
  .alert-stamp {
    position: absolute;
    top: 40px;
    right: 50px;
    transform: rotate(-8deg);
    border: 5px solid var(--alert-red);
    padding: 12px 28px;
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--alert-red);
    opacity: 0.85;
    pointer-events: none;
    user-select: none;
  }
  .spread-alert .kicker {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--alert-red);
    margin-bottom: 18px;
  }
  .spread-alert .headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(44px, 5.5vw, 72px);
    font-weight: 900;
    line-height: 1.0;
    color: var(--ink);
    max-width: 760px;
    margin-bottom: 30px;
  }
  .spread-alert .dek {
    font-size: 19px;
    line-height: 1.6;
    max-width: 640px;
    margin-bottom: 36px;
    font-weight: 400;
    color: #2a2a2a;
  }
  .spread-alert .timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-width: 600px;
    border-left: 3px solid var(--alert-red);
    padding-left: 28px;
    margin-top: 8px;
  }
  .spread-alert .t-event {
    padding: 12px 0;
    border-bottom: 1px solid rgba(214,43,43,0.2);
  }
  .spread-alert .t-event:last-child { border-bottom: none; }
  .spread-alert .t-date {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--alert-red);
  }
  .spread-alert .t-desc {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.45;
    margin-top: 3px;
  }

  /* 4 · TERMINAL — green on black */
  .spread-terminal {
    background: #2a2a2a;
    color: #e8e4da;
    padding: 80px 60px;
    border-bottom: 3px solid #1a1a1a;
    font-family: 'Inter', sans-serif;
  }
  .spread-terminal .sys-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(232,228,218,0.35);
    margin-bottom: 40px;
    border-bottom: 1px solid rgba(232,228,218,0.1);
    padding-bottom: 16px;
  }
  .spread-terminal .t-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .spread-terminal .t-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 3.5vw, 52px);
    font-weight: 900;
    line-height: 1.05;
    color: #fff;
    margin-bottom: 30px;
    letter-spacing: -0.01em;
  }
  .spread-terminal .zone-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    margin: 36px 0;
  }
  .spread-terminal .zone-cell {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 16px 14px;
    font-size: 13px;
  }
  .spread-terminal .zone-cell .zn {
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 4px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .spread-terminal .zone-cell .date {
    font-size: 15px;
    color: #fff;
    font-weight: 700;
  }
  .spread-terminal .t-body {
    font-size: 17px;
    line-height: 1.75;
    color: rgba(232,228,218,0.8);
    max-width: 700px;
  }
  .spread-terminal .t-body strong {
    color: #fff;
  }

  /* 5 · ACADEMIC — drop-cap, ivory */
  .spread-academic {
    background: var(--parchment);
    padding: 80px 60px;
    border-bottom: 3px solid var(--ink);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }
  .spread-academic .acad-number {
    font-family: 'Fraunces', serif;
    font-size: 200px;
    font-weight: 900;
    color: rgba(61,90,71,0.1);
    line-height: 0.85;
    margin-bottom: -30px;
  }
  .spread-academic .kicker {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 16px;
  }
  .spread-academic .headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(36px, 4.5vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 24px;
  }
  .spread-academic .drop-cap-para::first-letter {
    font-family: 'Fraunces', serif;
    font-size: 88px;
    font-weight: 900;
    float: left;
    line-height: 0.75;
    margin-right: 12px;
    margin-top: 6px;
    color: var(--sage);
  }
  .spread-academic .drop-cap-para {
    font-size: 18px;
    line-height: 1.7;
    color: #2a2a2a;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .spread-academic .body-para {
    font-size: 17px;
    line-height: 1.7;
    color: #333;
    margin-bottom: 18px;
  }
  .spread-academic .pull-quote {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-style: italic;
    font-weight: 600;
    color: var(--sage);
    border-left: 4px solid var(--sage);
    padding-left: 24px;
    margin: 32px 0;
    line-height: 1.4;
  }

  /* 6 · BIG STAT FINISH — ink */
  .spread-stat {
    background: var(--ink);
    color: var(--cream);
    padding: 80px 60px;
    border-bottom: 3px solid #000;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }
  .spread-stat .stat-number {
    font-family: 'Fraunces', serif;
    font-size: clamp(100px, 15vw, 180px);
    font-weight: 900;
    line-height: 0.85;
    color: var(--gold);
    letter-spacing: -0.04em;
  }
  .spread-stat .stat-label {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.5);
    margin-top: 12px;
  }
  .spread-stat .kicker {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }
  .spread-stat .headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(32px, 4vw, 50px);
    font-weight: 800;
    line-height: 1.05;
    color: var(--cream);
    margin-bottom: 24px;
  }
  .spread-stat .dek {
    font-size: 18px;
    font-weight: 300;
    line-height: 1.65;
    color: rgba(245,240,232,0.7);
    margin-bottom: 28px;
  }
  .spread-stat .race-detail {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 8px;
  }
  .spread-stat .race-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid rgba(245,240,232,0.12);
    font-size: 16px;
  }
  .spread-stat .race-row .rl { font-weight: 500; color: rgba(245,240,232,0.75); }
  .spread-stat .race-row .rv { font-weight: 800; color: var(--gold); font-family: 'Fraunces', serif; font-size: 20px; }

  /* ─── EVENTS BLOCK ─── */
  .spread-events {
    background: #f0ebe0;
    padding: 60px 60px;
    border-bottom: 3px solid var(--ink);
  }
  .events-header {
    display: flex;
    align-items: baseline;
    gap: 24px;
    margin-bottom: 48px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 16px;
  }
  .events-header h2 {
    font-family: 'Fraunces', serif;
    font-size: 52px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .events-header .ev-date {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #888;
  }
  .events-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }
  .event-card {
    padding: 28px;
    background: white;
    border-top: 4px solid var(--rust);
  }
  .event-card .ev-time {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 10px;
  }
  .event-card .ev-title {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .event-card .ev-desc {
    font-size: 15px;
    line-height: 1.55;
    color: #444;
  }

  /* ─── FOOTER ─── */
  .footer {
    background: var(--ink);
    color: rgba(245,240,232,0.5);
    padding: 48px 60px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 40px;
  }
  .footer .f-brand {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--cream);
    margin-bottom: 8px;
  }
  .footer .f-tag {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .footer h4 {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .footer p {
    font-size: 13px;
    line-height: 1.65;
  }
  .footer .f-cta {
    padding:
